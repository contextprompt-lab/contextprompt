<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meetcode — how it works</title>
  <meta name="description" content="See meetcode turn a meeting into repo-aware coding tasks, then watch the code change.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="/src/css/reset.css">
  <link rel="stylesheet" href="/src/css/tokens.css">
  <link rel="stylesheet" href="./css/playground.css">
  <link rel="stylesheet" href="./css/code.css">
</head>
<body>
  <div class="hiw" id="hiw" data-step="1">

    <!-- ====== TOP BAR ====== -->
    <header class="hiw-header">
      <a href="/" class="hiw-logo">meet<span>code</span></a>
      <div class="hiw-steps">
        <button class="step-tab active" data-step="1"><span class="step-num">1</span> Record</button>
        <span class="step-arrow">→</span>
        <button class="step-tab" data-step="2"><span class="step-num">2</span> Extract</button>
        <span class="step-arrow">→</span>
        <button class="step-tab" data-step="3"><span class="step-num">3</span> Execute</button>
      </div>
      <button class="hiw-replay" id="replay-btn">Replay</button>
    </header>

    <!-- ====== SPLIT LAYOUT ====== -->
    <div class="hiw-split">

      <!-- ===== LEFT: changes per step ===== -->
      <div class="hiw-left">

        <!-- Step 1: Meeting recording -->
        <div class="step-panel" id="step-1">
          <div class="panel-chrome">
            <div class="chrome-left">
              <span class="rec-dot"></span>
              <span class="rec-label">REC</span>
              <span id="meeting-timer">00:00</span>
            </div>
            <span class="chrome-title">Sprint Planning</span>
            <button class="skip-btn" id="meeting-skip">Skip →</button>
          </div>
          <div class="speakers">
            <div class="speaker participant" data-idx="0">
              <span class="speaker-av" style="background:#58a6ff">S</span>
              <span class="speaker-name">Sarah <span class="speaker-role">PM</span></span>
            </div>
            <div class="speaker participant" data-idx="1">
              <span class="speaker-av" style="background:#bc8cff">A</span>
              <span class="speaker-name">Alex <span class="speaker-role">Eng</span></span>
            </div>
          </div>
          <div class="transcript" id="meeting-transcript"></div>
        </div>

        <!-- Step 2: Extraction results -->
        <div class="step-panel" id="step-2">
          <div class="panel-chrome">
            <span class="chrome-title">meetcode output</span>
            <button class="next-btn" id="to-step-3">Execute tasks →</button>
          </div>
          <div class="extraction-body">
            <div id="extraction-steps"></div>
            <div id="extraction-plan"></div>
          </div>
        </div>

        <!-- Step 3: Claude Code terminal + diffs -->
        <div class="step-panel" id="step-3">
          <div class="panel-chrome">
            <span class="chrome-title">Claude Code</span>
          </div>
          <div class="exec-tasks" id="exec-tasks"></div>
          <div class="exec-body">
            <div class="exec-terminal" id="exec-terminal-body"></div>
            <div class="exec-diff" id="exec-diff"></div>
          </div>
        </div>
      </div>

      <!-- ===== RIGHT: always the app ===== -->
      <div class="hiw-right">
        <div class="preview-chrome">
          <div class="preview-dots"><span></span><span></span><span></span></div>
          <span class="preview-url">localhost:3000</span>
        </div>
        <div class="preview-app" id="preview-app">
          <div class="app-header"><h2>My Todos</h2></div>
          <div class="app-input-row">
            <div class="app-input">Add a todo...</div>
            <div class="app-add-btn">Add</div>
          </div>
          <ul class="app-list">
            <li class="app-item">
              <input type="checkbox" disabled>
              <span class="item-title">Design landing page</span>
              <span class="item-date hidden">Mar 15</span>
              <span class="item-priority hidden priority-high">high</span>
              <button class="item-delete hidden">×</button>
            </li>
            <li class="app-item">
              <input type="checkbox" checked disabled>
              <span class="item-title">Set up CI/CD pipeline</span>
              <span class="item-date hidden">Mar 10</span>
              <span class="item-priority hidden priority-medium">med</span>
              <button class="item-delete hidden">×</button>
            </li>
            <li class="app-item">
              <input type="checkbox" disabled>
              <span class="item-title">Write API docs</span>
              <span class="item-date hidden">Mar 20</span>
              <span class="item-priority hidden priority-low">low</span>
              <button class="item-delete hidden">×</button>
            </li>
          </ul>
        </div>

        <!-- Code source (visible in step 1 below the app) -->
        <div class="preview-code" id="preview-code">
          <div class="code-tabs">
            <button class="code-tab active" data-file="TodoApp.tsx">TodoApp.tsx</button>
            <button class="code-tab" data-file="TodoItem.tsx">TodoItem.tsx</button>
            <button class="code-tab" data-file="todos.ts">todos.ts</button>
          </div>
          <pre class="code-body" id="code-panel-body"></pre>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/playground.js"></script>
</body>
</html>
